<div class="md-sidebar md-sidebar--primary" data-md-component="navigation">
  <div class="md-sidebar__scrollwrap">
    <div class="md-sidebar__inner">
      <nav class="md-nav md-nav--primary" data-md-level="0">
        <label class="md-nav__title md-nav__title--site" for="__drawer">
          <span class="md-nav__button md-logo">
            {% if site.logo %}
              <img height="48" src="{{ site.baseurl }}/{{ site.logo }}" width="48">
            {% else %}
              <i class="md-icon"></i>
            {% endif %}
          </span> 
          {{ site.title }}
        </label>

        <div class="md-nav__source">
          <a class="md-source" data-md-source="github" href="{{ site.repo }}" title="Go to repository">
            <div class="md-source__icon">
              <svg height="24" viewbox="0 0 24 24" width="24">
                <use height="24" width="24" xlink:href="#__github"></use>
              </svg>
            </div>
            <div class="md-source__repository">
              {{ site.github_user }}/{{ site.github_repo }}
            </div>
          </a>
        </div>

        <ul class="md-nav__list" data-md-scrollfix="">
          
          <li class="md-nav__item">
            <a class="md-nav__link" href="{{ site.baseurl }}/" title="Home">HOME</a>
          </li>

          <li class="md-nav__item">
            <a class="md-nav__link" href="{{ site.baseurl }}/docs/team/" title="Team">TEAM</a>
          </li>

          <li class="md-nav__item">
            <a class="md-nav__link" href="{{ site.baseurl }}/docs/research/" title="Research">RESEARCH</a>
          </li>

          <li class="md-nav__item">
            <a class="md-nav__link" href="{{ site.baseurl }}/docs/publication/" title="Publication">PUBLICATION</a>
          </li>

          <li class="md-nav__item">
            <a class="md-nav__link" href="{{ site.baseurl }}/docs/recent-news/" title="Recent News">RECENT NEWS</a>
          </li>

          <li class="md-nav__item">
            <a class="md-nav__link" href="{{ site.baseurl }}/docs/contact/" title="Contact">CONTACT</a>
          </li>

          <li class="md-nav__item md-nav__item--nested">
            <nav class="md-nav md-nav--secondary">
              <ul class="md-nav__list" data-md-scrollfix="">
                {% for section in site.data.toc %}
                <li class="md-nav__item">
                  <a class="md-nav__link" href="{% if section.external_url %}{{ section.external_url }}{% else %}{{ site.baseurl }}/{{ section.url }}{% endif %}"
                     id="pancakes-{{ section.title | slugify }}" 
                     title="{{ section.title }}">{{ section.title }}</a>
                </li>
                {% endfor %}
              </ul>
            </nav>
          </li>
        </ul>
      </nav>
    </div>
  </div>
</div>

<div class="md-sidebar md-sidebar--secondary" data-md-component="toc">
  <div class="md-sidebar__scrollwrap">
    <div class="md-sidebar__inner">
      <nav class="md-nav md-nav--secondary">
        <ul id="nav-toc" class="md-nav__list" data-md-scrollfix="">
          </ul>
      </nav>
    </div>
  </div>
</div>
